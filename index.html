<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War of Liberation - CODM Style Tactical Network</title>
    <style>
        /* ==================== STYLE GLOBAL CODM ==================== */
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Oswald', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #040506;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(4,5,6,0.85) 0%, rgba(11,15,19,0.95) 100%),
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><path d="M0 40L40 0M0 0l40 40" stroke="rgba(255,255,255,0.02)" stroke-width="1"/></svg>');
            z-index: -1;
        }

        .container {
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            max-height: 750px;
            background: rgba(16, 22, 27, 0.95);
            border: 2px solid #2d3842;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ==================== ÉCRAN D'ACCUEIL / AUTH ==================== */
        .auth-screen {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .auth-cinematic {
            flex: 1.2;
            background: linear-gradient(270deg, #10161b 0%, rgba(16,22,27,0.4) 100%), 
                        url('assets/images/homepage-bg.gif') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .auth-form-side {
            flex: 0.8;
            background: #0b0f13;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            border-left: 2px solid #2d3842;
        }

        .codm-logo-box {
            margin-bottom: 25px;
            animation: pulseLogo 3s infinite ease-in-out;
            text-align: center;
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(243,169,19,0.3)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 20px rgba(243,169,19,0.6)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(243,169,19,0.3)); }
        }

        .codm-title {
            font-size: 46px;
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            color: #ffffff;
            margin-top: 15px;
        }

        .codm-title span { color: #f3a913; }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #f3a913;
            margin-bottom: 6px;
        }

        .codm-input {
            width: 100%;
            padding: 14px;
            background: #141b22;
            border: 1px solid #334454;
            color: #fff;
            margin-bottom: 15px;
        }

        .codm-btn {
            width: 100%;
            padding: 16px;
            background: #f3a913;
            color: #000;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }
        /* ==================== MODE HISTOIRE / BRIEFING ==================== */
        #storyScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            text-align: center;
        }

        .story-header {
            font-size: 12px;
            color: #f3a913;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .story-text {
            font-size: 24px;
            max-width: 800px;
            line-height: 1.6;
            color: #fff;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 50px;
        }

        .typewriter-effect {
            overflow: hidden;
            border-right: 3px solid #f3a913;
            white-space: normal;
            margin: 0 auto;
            animation: blink-caret .75s step-end infinite;
        }

        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #f3a913 } }

        /* ==================== LOBBY DU JEU ==================== */
        .game-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .codm-topbar {
            height: 65px;
            background: #0b0f13;
            border-bottom: 2px solid #2d3842;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .player-tag {
            background: linear-gradient(90deg, #1a242d 0%, transparent 100%);
            padding: 5px 15px;
            border-left: 3px solid #f3a913;
        }

        .player-level-bar {
            width: 180px;
            height: 6px;
            background: #222c35;
            margin-top: 4px;
            border-radius: 3px;
            overflow: hidden;
        }

        .level-progress { height: 100%; width: 50%; background: #f3a913; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }

        .codm-tabs-side {
            width: 240px;
            background: #080b0e;
            border-right: 1px solid #2d3842;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            gap: 8px;
        }

        .codm-tab-btn {
            background: transparent; border: none; color: #7a8c9e;
            text-align: left; padding: 14px 20px; font-weight: 600;
            text-transform: uppercase; cursor: pointer;
        }

        .codm-tab-btn.active {
            color: #000; background: #f3a913;
            clip-path: polygon(0 0, 92% 0, 100% 30%, 100% 100%, 0 100%);
        }

        .content-view { flex: 1; padding: 25px; background: #10161b; overflow-y: auto; }

        .codm-modes-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        .codm-mode-card {
            height: 180px; position: relative; border: 1px solid #2d3842;
            overflow: hidden; cursor: pointer;
        }

        .mode-info {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 15px 20px; z-index: 2; display: flex;
            justify-content: space-between; align-items: flex-end;
            background: linear-gradient(0deg, #000 0%, transparent 100%);
        }

        .rank-badge { padding: 3px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.2); }
        .rank-mareshall { background: linear-gradient(135deg, #f3a913 0%, #ff1744 100%); color: #fff; }

        .toast {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: #0b0f13; color: white; padding: 12px 25px;
            border-left: 4px solid #f3a913; display: none; z-index: 5000;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="container">
        
        <div id="storyScreen">
            <div class="story-header">TRANSMISSION ENTRANTE : ANALYSE TACTIQUE</div>
            <div id="typewriter" class="story-text"></div>
            <button class="codm-btn" style="width: 250px;" onclick="closeStory()">ACCEPTER LA MISSION</button>
        </div>

        <div id="authScreen" class="auth-screen">
            <div class="auth-cinematic">
                <div class="codm-logo-box">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="110" height="110">
                        <polygon points="50,3 93,22 93,65 50,97 7,65 7,22" fill="#141a22" stroke="#2d3842" stroke-width="4"/>
                        <polygon points="50,9 87,26 87,62 50,90 13,62 13,26" fill="#0b0f13" stroke="#f3a913" stroke-width="2"/>
                        <polygon points="50,22 54,34 67,34 57,42 61,54 50,47 39,54 43,42 33,34 46,34" fill="#f3a913"/>
                    </svg>
                    <h1 class="codm-title">WAR OF<br><span>LIBERATION</span></h1>
                    <div class="codm-subtitle">Tactical Network Grid</div>
                </div>
            </div>
            <div class="auth-form-side">
                <div class="form-group">
                    <label>Identifiant Réseau / Email</label>
                    <input type="text" id="usernameInput" class="codm-input" placeholder="OPERATOR_ID">
                    <label>Clé Cryptographique</label>
                    <input type="password" id="passwordInput" class="codm-input" placeholder="PASSWORD">
                </div>
                <button class="codm-btn" onclick="handleAuth('login')">INITIALISER LA LIAISON</button>
            </div>
        </div>

        <div id="gameScreen" class="game-screen">
            <div class="codm-topbar">
                <div class="topbar-left">
                    <div class="player-tag">
                        <span class="player-name" id="operatorTitle">OPERATOR</span>
                        <div class="player-level-bar"><div id="levelProgress" class="level-progress"></div></div>
                    </div>
                    <span id="statusDisplay" class="rank-badge rank-vanguard">Vanguard I</span>
                </div>
                <div class="topbar-right">
                    <span id="rankIndexDisplay" style="font-size: 13px; color: #8a9ba8;">XP: 1000</span>
                    <button onclick="logout()" style="background: transparent; border: 1px solid #334454; color: #fff; padding: 5px 12px; font-size: 11px; cursor: pointer;">DISCONNECT</button>
                </div>
            </div>

            <div class="main-layout">
                <div class="codm-tabs-side">
                    <button class="codm-tab-btn active" onclick="switchTab('tab-matchmaking')">⚔️ Salon des modes</button>
                    <button class="codm-tab-btn" onclick="switchTab('tab-caserne')">👥 Garnison</button>
                </div>

                <div class="content-view">
                    <div id="tab-matchmaking" class="tab-content active">
                        <div class="codm-modes-grid">
                            <div class="codm-mode-card" style="border-left: 4px solid #ff1744;">
                                <div class="mode-info">
                                    <div class="mode-text"><h3 style="color:#ff1744;">Battle of Liberation</h3><p>Conflit de faction massif.</p></div>
                                    <button class="mode-action-btn" onclick="showToast('Chargement...')">Lancer</button>
                                </div>
                            </div>
                            <div class="codm-mode-card" style="border-left: 4px solid #f3a913;">
                                <div class="mode-info">
                                    <div class="mode-text"><h3>Parties Classées</h3><p>Compétition SBMM.</p></div>
                                    <button class="mode-action-btn" onclick="runSBMM()">Match</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // CONFIGURATION ADMINS
        const admin1Email = "anaeldessouassi@gmail.com"; 
        const admin1Password = "admin123";               
        const admin2Email = "samueltossavi92@gmail.com";
        const admin2Password = "204620";

        // SCÉNARIO DU JEU
        const gameStory = [
            "Année 2026. L'histoire telle que nous la connaissons est en péril.",
            "Des forces obscures tentent de manipuler le passé pour déclencher une guerre mondiale totale.",
            "Votre objectif est simple : Infiltrez la Grille Réseau, identifiez les points de rupture historiques et empêchez le chaos.",
            "Commandant, la libération ne se gagne pas... elle se construit par la stratégie."
        ];

        let userRankIndex = 0; let userXP = 1000; let currentUser = "";

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display='none', 2000); }

        function handleAuth(mode) {
            const email = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            if(!email || !pass) return;

            if ((email === admin1Email && pass === admin1Password) || (email === admin2Email && pass === admin2Password)) {
                currentUser = email === admin1Email ? "Anael_Dev" : "SamuelTsa";
                userRankIndex = 34; // Max Rank
                startStory(); // DÉCLENCHE LE MODE HISTOIRE
                return;
            }
            currentUser = email.split('@')[0];
            startStory();
        }

        // --- GESTION DU MODE HISTOIRE ---
        function startStory() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('storyScreen').style.display = 'flex';
            typeWriter(gameStory.join(" "));
        }

        function typeWriter(text) {
            let i = 0;
            const target = document.getElementById('typewriter');
            target.innerHTML = "";
            function typing() {
                if (i < text.length) {
                    target.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, 30); // Vitesse de la machine à écrire
                }
            }
            typing();
        }
        function closeStory() {
            document.getElementById('storyScreen').style.display = 'none';
            setupGameUI();
        }

        function setupGameUI() {
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('operatorTitle').innerText = currentUser;
            updateUserRank();
        }

        function updateUserRank() {
            document.getElementById('rankIndexDisplay').innerText = XP: ${userXP};
            document.getElementById('levelProgress').style.width = 80%;
        }

        function logout() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('authScreen').style.display = 'flex';
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.codm-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
