<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War of Liberation - CODM Style Tactical Network</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Oswald', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #040506;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            max-height: 750px;
            background: rgba(16, 22, 27, 0.95);
            border: 2px solid #2d3842;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ==================== AUTH SCREEN ==================== */
        .auth-screen {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .auth-cinematic {
            flex: 1.2;
            background: #10161b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .auth-form-side {
            flex: 0.8;
            background: #0b0f13;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            border-left: 2px solid #2d3842;
        }

        .codm-logo-box {
            margin-bottom: 25px;
            text-align: center;
        }

        .codm-title {
            font-size: 46px;
            font-weight: 800;
            line-height: 0.85;
            text-transform: uppercase;
            color: #ffffff;
            margin-top: 15px;
        }

        .codm-title span { color: #f3a913; }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #f3a913;
            margin-bottom: 6px;
        }

        .codm-input {
            width: 100%;
            padding: 14px;
            background: #141b22;
            border: 1px solid #334454;
            color: #fff;
            margin-bottom: 15px;
        }

        .codm-btn {
            width: 100%;
            padding: 16px;
            background: #f3a913;
            color: #000;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* ==================== STORY SCREEN ==================== */
        #storyScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #05080c;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .story-header {
            font-size: 13px;
            color: #f3a913;
            letter-spacing: 5px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .story-content-box {
            background: #0b1118;
            border: 1px solid #1c2630;
            padding: 30px;
            max-width: 750px;
            margin-bottom: 35px;
        }

        .story-p {
            font-size: 18px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .story-p.highlight { color: #f3a913; font-weight: 700; }

        /* ==================== GAME LOBBY ==================== */
        .game-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .codm-topbar {
            height: 65px;
            background: #0b0f13;
            border-bottom: 2px solid #2d3842;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .player-tag {
            background: #1a242d;
            padding: 5px 15px;
            border-left: 3px solid #f3a913;
        }

        .main-layout { display: flex; flex: 1; }

        .codm-tabs-side {
            width: 240px;
            background: #080b0e;
            border-right: 1px solid #2d3842;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            gap: 8px;
        }

        .codm-tab-btn {
            background: transparent; border: none; color: #7a8c9e;
            text-align: left; padding: 14px 20px; font-weight: 600;
            text-transform: uppercase; cursor: pointer;
        }

        .codm-tab-btn.active { color: #000; background: #f3a913; }

        .content-view { flex: 1; padding: 25px; background: #10161b; }

        .codm-modes-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        .codm-mode-card {
            height: 180px; position: relative; border: 1px solid #2d3842;
            background: rgba(20,27,34,0.6); display: flex; align-items: flex-end; padding: 20px;
        }

        .toast {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: #0b0f13; color: white; padding: 12px 25px;
            border-left: 4px solid #f3a913; display: none; z-index: 5000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="storyScreen">
            <div class="story-header">TRANSMISSION ENTRANTE</div>
            <div class="story-content-box">
                <p class="story-p">Année 2026. L'histoire est en péril.</p>
                <p class="story-p highlight">OBJECTIF : Empêchez le chaos imminent.</p>
            </div>
            <button class="codm-btn" style="width: 280px;" onclick="closeStory()">ACCEPTER LA MISSION</button>
        </div>

        <div id="authScreen" class="auth-screen">
            <div class="auth-cinematic">
                <h1 class="codm-title">WAR OF<br><span>LIBERATION</span></h1>
            </div>
            <div class="auth-form-side">
                <div class="form-group">
                    <label>Identifiant Réseau / Email</label>
                    <input type="text" id="usernameInput" class="codm-input" placeholder="OPERATOR_ID">
                    <label>Clé Cryptographique</label>
                    <input type="password" id="passwordInput" class="codm-input" placeholder="PASSWORD">
                </div>
                <button class="codm-btn" onclick="handleAuth()">INITIALISER LA LIAISON</button>
            </div>
        </div>

        <div id="gameScreen" class="game-screen">
            <div class="codm-topbar">
                <div class="player-tag"><span id="operatorTitle">OPERATOR</span></div>
                <button onclick="logout()" style="background: transparent; border: 1px solid #334454; color: #fff; padding: 5px 12px; cursor: pointer;">DISCONNECT</button>
            </div>
            <div class="main-layout">
                <div class="codm-tabs-side">
                    <button class="codm-tab-btn active">⚔️ Salon des modes</button>
                </div>
                <div class="content-view">
                    <div class="codm-modes-grid">
                        <div class="codm-mode-card">
                            <div>
                                <h3 style="color:#ff1744;">Battle of Liberation</h3>
                                <button class="codm-btn" style="padding: 5px 10px; margin-top: 10px;" onclick="showToast('Déploiement...')">Lancer</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const admin1Email = "anaeldessouassi@gmail.com"; 
        const admin1Password = "300409";            
        const admin2Email = "samueltossavi92@gmail.com";
        const admin2Password = "204620";

        let currentUser = "";
        function showToast(msg) { 
            const t = document.getElementById('toast'); 
            t.innerText = msg; 
            t.style.display = 'block'; 
            setTimeout(() => t.style.display='none', 2000); 
        }

        function handleAuth() {
            const email = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            
            if(!email || !pass) {
                showToast("Veuillez remplir tous les champs.");
                return;
            }

            if ((email === admin1Email && pass === admin1Password) || (email === admin2Email && pass === admin2Password)) {
                currentUser = (email === admin1Email) ? "Anael_Dev" : "SamuelTsa";
            } else {
                currentUser = email.split('@')[0];
            }
            
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('storyScreen').style.display = 'flex';
        }

        function closeStory() {
            document.getElementById('storyScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('operatorTitle').innerText = currentUser;
        }

        function logout() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('usernameInput').value = "";
            document.getElementById('passwordInput').value = "";
        }
    </script>
</body>
</html>
